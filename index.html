<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda de Viajes</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #333; }
    form, table { margin-bottom: 20px; }
    input, button { padding: 8px; margin: 4px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px; border: 1px solid #ddd; text-align: left; }
  </style>
</head>
<body>
  <h1>Agenda de Viajes</h1>

  <section id="crear">
    <h2>Agendar Viaje</h2>
    <form id="form-crear">
      <input type="text" id="origen" placeholder="Origen" required/>
      <input type="text" id="destino" placeholder="Descripción" required />
      <input type="date" id="fecha" placeholder="Fecha" required />
      <input type="number" id="capacidad" placeholder="Capacidad" required />
      <button type="submit">Agendar</button>
    </form>
  </section>

  <section id="listar">
    <h2>Agenda de Viajes Pendientes</h2>
    <button id="btn-listar">Refrescar lista</button>
    <table>
      <thead>
        <tr>
          <th>Origen</th><th>Descripción</th><th>Fecha</th><th>Capacidad</th><th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody-viajes"></tbody>
    </table>
  </section>

  <script>
    const API = 'http://localhost:3000';

    // Crear
    document.getElementById('form-crear').addEventListener('submit', async e => {
      e.preventDefault();
      const data = {
        origen: document.getElementById('origen').value,
        destino: document.getElementById('destino').value,
        fecha: document.getElementById('fecha').value,
        capacidad: parseInt(document.getElementById('capacidad').value)
      };
      const resp = await fetch(`${API}/viaje`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (resp.ok) {
        alert('Viaje agendado correctamente');
        listarAgenda();
      } else {
        alert('Error al agendar el viaje');
      }
    });

    // Listar
    document.getElementById('btn-listar').addEventListener('click', listarAgenda);
    async function listarAgenda() {
      const resp = await fetch(`${API}/viajes`);
      const lista = await resp.json();
      const tbody = document.getElementById('tbody-viajes');
      tbody.innerHTML = '';
      lista.forEach(v => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${v.origen}</td>
          <td>${v.destino}</td>
          <td>${v.fecha}</td>
          <td>${v.capacidad}</td>
          <td>
            <button onclick="ver(${v.id})">Ver</button>
            <button onclick="editar(${v.id})">Editar</button>
            <button onclick="eliminar(${v.id})">Cancelar Viaje</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Ver
    window.ver = async id => {
      const resp = await fetch(`${API}/viaje/${id}`);
      if (resp.ok) {
        const v = await resp.json();
        alert(JSON.stringify(v, null, 2));
      } else {
        alert('Viaje no agendado o ya realizado');
      }
    };

    // Eliminar
    window.eliminar = async id => {
      if (!confirm('Seguro que desea cancelar el viaje?')) return;
      const resp = await fetch(`${API}/viaje/${id}`, { method: 'DELETE' });
      if (resp.ok) {
        alert('Viaje cancelado exitosamente!');
        listarAgenda();
      } else {
        alert('Error al cancelar el viaje');
      }
    };

    // Editar
    window.editar = async id => {
      const respGet = await fetch(`${API}/viaje/${id}`);
      if (!respGet.ok) { return alert('No se pudo obtener los datos del viaje'); }
      const v = await respGet.json();
      const origen = prompt('origen:', v.origen);
      const destino = prompt('Descripción:', v.destino);
      const fecha = prompt('fecha:', v.fecha);
      const capacidad = parseInt(prompt('Capacidad:', v.capacidad));
      const data = { origen, destino, fecha, capacidad };
      const respPut = await fetch(`${API}/viaje/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (respPut.ok) {
        alert('Datos del viaje actualizados correctamente!');
        listarAgenda();
      } else {
        alert('Error al actualizar los datos');
      }
    };

    // Cargar lista al iniciar
    listarAgenda();
  </script>
</body>
</html>
